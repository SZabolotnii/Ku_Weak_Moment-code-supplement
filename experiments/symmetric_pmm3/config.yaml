name: symmetric_pmm3
description: |
  W5: degree-1 vs degree-3 weak PMM on SYMMETRIC heavy-tailed regression.
  Tests whether the odd cubic (kurtosis-coupled) PMM-3 term adds efficiency
  over the degree-1 weak PMM (= redescending M-estimator), and how close
  either gets to the MATCHED MLE oracle.

  Key design from W5 pre-check:
   - only fast-decay windows (gaussian, tukey_compact, hann_value): cauchy_like
     leaves windowed m_6^w unstable for Cauchy (gamma_4^w explodes).
   - matched MLE oracle per regime (Cauchy MLE / Student-t MLE with known df).
   - scale swept to locate where the cubic term has the most room (wide windows
     leave more residual kurtosis for PMM-3 to exploit).

beta_true: [0.5, 1.0]
sample_sizes: [128, 256, 512, 1024]
replications: 5000
base_seed: 20260526

x_design: uniform_-1_1

windows:
  - {family: gaussian,      scale_mults: [1.0, 1.5, 2.0, 3.0]}
  - {family: tukey_compact, scale_mults: [3.0, 4.685, 6.0, 8.0]}
  - {family: hann_value,    scale_mults: [3.0, 4.685, 6.0, 8.0]}

regimes:
  - {name: pure_cauchy,    kind: cauchy,    gamma: 1.0,  mle: cauchy,  mle_df: 1.0}
  - {name: student_t_df1p5,kind: t,         df: 1.5,     mle: t,       mle_df: 1.5}
  - {name: student_t_df3,  kind: t,         df: 3.0,     mle: t,       mle_df: 3.0}
  - {name: student_t_df5,  kind: t,         df: 5.0,     mle: t,       mle_df: 5.0}
  - {name: sym_alpha_stable,kind: alpha_stable, alpha: 1.5, beta: 0.0, mle: cauchy, mle_df: 1.0}

scale_unit: "scale = scale_mult * MAD(LAD residuals)/0.6745"
